name: Deploy to HostGator

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Sync
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          tools: composer:v2

      - name: 🛠️ Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress --prefer-dist

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ✨ Build assets (Vite/Mix)
        run: |
          npm install
          npm run build

      - name: 🚀 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            .env
            phpunit.xml

      - name: 🧰 Run Laravel deploy commands
        run: |
          ssh \
            -i ~/.ssh/github_actions_deploy \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o KexAlgorithms=+diffie-hellman-group-exchange-sha256 \
            $REMOTE_USER@$REMOTE_HOST << EOF
              cd $REMOTE_PATH

              php artisan down || true
              composer install --no-dev --optimize-autoloader
              php artisan migrate --force
              php artisan storage:link || true
              php artisan optimize:clear
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan queue:restart || true
              php artisan up
          EOF
